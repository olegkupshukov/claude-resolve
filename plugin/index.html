<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Claude Resolve</title>
    <link rel="stylesheet" type="text/css" href="./css/design-tokens.css" />
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <script type="text/javascript" src="./renderer.js"></script>
</head>
<body>
    <div id="status-bar">
        <span id="projectName">--</span>
        <span class="sep">/</span>
        <span id="currentPage">--</span>
        <span class="sep">/</span>
        <span id="currentTimeline">--</span>
    </div>

    <div id="output"></div>

    <div id="input-bar">
        <input type="text" id="prompt" placeholder="Ask Claude..." autofocus />
        <button id="btn-send" class="btn">Send</button>
        <button id="btn-stop" class="btn btn-stop" hidden>Stop</button>
    </div>
</body>
</html>
